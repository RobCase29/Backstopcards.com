<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backstop Card Finder Access</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #081312;
        color: #fff8ea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(115deg, rgba(184, 255, 75, 0.14), transparent 28%),
          radial-gradient(circle at 74% 18%, rgba(217, 131, 49, 0.24), transparent 30%),
          linear-gradient(180deg, #081312 0%, #111817 54%, #eee8d9 54%, #f8f3e6 100%);
      }

      main {
        width: min(100%, 430px);
        border: 1px solid rgba(255, 248, 234, 0.14);
        border-radius: 18px;
        background: rgba(8, 19, 18, 0.92);
        box-shadow: 0 24px 90px rgba(0, 0, 0, 0.34);
        padding: 30px;
      }

      img {
        width: 82px;
        height: 82px;
        object-fit: cover;
        border-radius: 18px;
        border: 1px solid rgba(255, 248, 234, 0.16);
        background: #fff8ea;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: clamp(2rem, 8vw, 3.2rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: rgba(255, 248, 234, 0.7);
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 12px;
        margin-top: 24px;
      }

      label {
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: rgba(255, 248, 234, 0.66);
      }

      input {
        width: 100%;
        min-height: 54px;
        border: 1px solid rgba(255, 248, 234, 0.2);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff8ea;
        padding: 0 14px;
        font: inherit;
        outline: none;
      }

      input:focus {
        border-color: #b7ff39;
        box-shadow: 0 0 0 3px rgba(183, 255, 57, 0.14);
      }

      button {
        min-height: 54px;
        border: 1px solid rgba(183, 255, 57, 0.42);
        border-radius: 10px;
        background: linear-gradient(180deg, #d6ff7a, #9bd82d);
        color: #091211;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      .error {
        display: none;
        margin-top: 14px;
        color: #ffd6bd;
        font-weight: 800;
      }

      body[data-error="true"] .error {
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/backstop-logo.jpeg" alt="Backstop Cards" />
      <h1>Private Clubhouse</h1>
      <p>Backstop Card Finder is invite-only while the model is still being sharpened.</p>
      <p class="error">That code did not match. Check it and try again.</p>
      <form method="post" action="/api/access/login">
        <input id="next" name="next" type="hidden" value="/" />
        <label for="code">Access code</label>
        <input id="code" name="code" type="password" autocomplete="current-password" autofocus required />
        <button type="submit">Enter Backstop</button>
      </form>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search)
      document.body.dataset.error = params.get('error') === '1' ? 'true' : 'false'
      document.querySelector('#next').value = params.get('next') || '/'
    </script>
  </body>
</html>
